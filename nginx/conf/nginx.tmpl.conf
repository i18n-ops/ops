#   ssl_certificate_key /opt/ssl/${host}_ecc/$host.key;
#   server_name _;
#   return      444;
# }

# include /etc/nginx/site/*.conf;
include /etc/nginx/vps/VPS/*.conf;
include /etc/nginx/site/*.conf;

}

include head/events.conf;

