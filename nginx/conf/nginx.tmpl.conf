worker_processes 6;

http {
#resolver 127.0.0.1;
#resolver 127.0.0.11; docker

include head/logfmt.conf;
include head/http.conf;


# 返回444（Nginx定义的非标准状态码，用于指示Nginx程序关闭连接不响应该请求）
# server_name _;中的_为无效名称，不匹配任何实际的名称

server {
  listen      80 default_server reuseport;
  listen      [::]:80 default_server reuseport;
  server_name _;
  rewrite ^(.+) https://$host$1 permanent;
}

server {
  listen 443 ssl reuseport;
  listen [::]:443 ssl reuseport;
  listen 443 quic reuseport;
  listen [::]:443 quic reuseport;

  ssl_certificate /etc/nginx/.cer;
  ssl_certificate_key /etc/nginx/.key;

  location / {
      return 444;  # 返回非标准响应码 444 表示关闭连接
  }
}

