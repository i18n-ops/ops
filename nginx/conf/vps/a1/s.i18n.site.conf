include upstream/i18n.conf;

server {
http2 on;
listen 443 ssl reuseport;
listen [::]:443 ssl reuseport;
add_header Alt-Svc 'h3=":443";ma=99999;persist=1';
access_log /var/log/nginx/h2.s.i18n.site.access.log global_main;
error_log /var/log/nginx/h2.s.i18n.site.error.log error;
include url/s.i18n.site.conf;
}


server {
listen 443 quic reuseport;
listen [::]:443 quic reuseport;
access_log /var/log/nginx/h3.s.i18n.site.access.log global_main;
error_log /var/log/nginx/h3.s.i18n.site.error.log error;
include url/s.i18n.site.conf;
}


server {
http2 on;
listen 443 ssl ;
listen [::]:443 ssl ;
add_header Alt-Svc 'h3=":443";ma=99999;persist=1';
access_log /var/log/nginx/h2.a1.3ti.site.access.log global_main;
error_log /var/log/nginx/h2.a1.3ti.site.error.log error;
include url/a1.3ti.site.conf;
}


server {
listen 443 quic ;
listen [::]:443 quic ;
access_log /var/log/nginx/h3.a1.3ti.site.access.log global_main;
error_log /var/log/nginx/h3.a1.3ti.site.error.log error;
include url/a1.3ti.site.conf;
}


